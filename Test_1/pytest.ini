# Pytest configuration for Vocalyze testing suite
# Place this file in the TestingFiles folder root

[pytest]
# Minimum version
minversion = 7.0

# Test discovery paths
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov flag)
# Uncomment to enable coverage by default
# addopts = 
#     -v
#     --cov=.
#     --cov-report=term-missing
#     --cov-report=html

# Define custom markers
markers =
    unit: Unit tests - test individual functions/methods
    integration: Integration tests - test interactions between components
    api: API tests - test REST endpoints
    slow: Slow running tests (takes >5 seconds)
    audio: Audio processing tests
    db: Database tests
    security: Security and authentication tests
    performance: Performance and load tests
    smoke: Quick sanity check tests

# Async test configuration
asyncio_mode = auto

# Test execution
# Set to false to disable capturing output
console_output_style = progress

# Timeout for tests (seconds)
# Uncomment to enable timeout (requires pytest-timeout)
# timeout = 300

# Logging configuration
log_cli = false
log_cli_level = INFO
log_file = tests.log
log_file_level = DEBUG

# Python path
pythonpath = ..

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
